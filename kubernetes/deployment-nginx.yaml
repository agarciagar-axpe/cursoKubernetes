apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment

spec:

  replicas: 3

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: nginx

  template:  
    metadata:
      labels:
        app: nginx
      annotations:
        co.elastic.logs/module: "nginx"
        co.elastic.logs/fileset.stdout: "access"
    spec:
      serviceAccountName: nginx
      containers:
        - name: nginx
          image: nginx:1.28.1
          ports:
          - containerPort: 80
          - containerPort: 8081
          resources:
            requests:
              memory: 64M
              cpu: 100m
            limits:
              memory: 128Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 3
            periodSeconds: 10
          volumeMounts:
          - name: config
            mountPath: /etc/nginx/conf.d/status.conf
            subPath: status.conf 

        - name: metrics-exporter
          image: nginx/nginx-prometheus-exporter:1.5.1
          resources:
            requests:
              memory: 64M
              cpu: 100m
            limits:
              memory: 128Mi
              cpu: 100m
          ports:
          - containerPort: 9113
            name: prometheus
          args:
          - --nginx.scrape-uri=http://127.0.0.1:8081/stub_status

      volumes:
        - name: config
          configMap:
            name: config-nginx

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: config-nginx
data:
  status.conf: |
    server {
      listen 8081;
      server_name status.localhost;

      access_log off;

      location /stub_status {
          stub_status on;
      }
    } 